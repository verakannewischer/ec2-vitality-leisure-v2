<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Coach — Vitality</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream:   #FDFAF6;
            --sand:    #D4B896;
            --forest:  #2D5A2D;
            --dark:    #1A2E1A;
            --white:   rgba(253,250,246,0.95);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Jost', sans-serif;
            font-weight: 300;
            background: var(--dark);
        }

        /* Full screen background */
        .bg {
            position: fixed;
            inset: 0;
            background-image: url('/static/images/forest_bg.png');
            background-size: cover;
            background-position: center 30%;
            z-index: 0;
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(26,46,26,0.2) 0%,
                rgba(26,46,26,0.38) 35%,
                rgba(26,46,26,0.68) 70%,
                rgba(26,46,26,0.82) 100%
            );
        }

        /* Minimal nav */
        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem 3rem;
        }

        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            color: rgba(253,250,246,0.7);
            text-decoration: none;
            letter-spacing: 0.04em;
        }

        .nav-back {
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(253,250,246,0.5);
            text-decoration: none;
            transition: color 0.3s;
        }
        .nav-back:hover { color: rgba(253,250,246,0.9); }

        /* Main container */
        .wellness-wrap {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 0 2rem 3.5rem;
        }

        .wellness-inner {
            width: 100%;
            max-width: 660px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Heading — shown when no messages */
        .heading-wrap {
            text-align: center;
            margin-bottom: 2.5rem;
            transition: all 0.6s ease;
        }

        .heading-wrap.hidden {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
            height: 0;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.8rem, 7vw, 5rem);
            font-weight: 300;
            font-style: italic;
            color: var(--cream);
            line-height: 1.15;
            text-shadow: 0 2px 30px rgba(0,0,0,0.4);
            letter-spacing: 0.01em;
        }

        /* Messages */
        .messages {
            width: 100%;
            max-height: 55vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.25rem;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.15) transparent;
        }

        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        .msg { max-width: 85%; animation: fadeUp 0.4s ease; }

        .msg-user {
            align-self: flex-end;
            background: rgba(253,250,246,0.18);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(253,250,246,0.25);
            border-radius: 18px 18px 4px 18px;
            padding: 0.75rem 1.2rem;
            color: var(--cream);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .msg-bot {
            align-self: flex-start;
            background: rgba(26,46,26,0.72);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(92,138,60,0.25);
            border-radius: 4px 18px 18px 18px;
            padding: 1rem 1.3rem;
            color: rgba(245,240,232,0.92);
            font-size: 0.88rem;
            line-height: 1.75;
        }

        .msg-bot strong { color: var(--sand); }
        .msg-bot em { color: rgba(212,184,150,0.8); font-style: italic; }

        .msg-label {
            font-size: 0.62rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(212,184,150,0.5);
            margin-bottom: 0.3rem;
        }

        /* Input oval */
        .input-wrap {
            position: relative;
            width: 100%;
        }

        .input-field {
            width: 100%;
            background: rgba(253,250,246,0.14);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(253,250,246,0.35);
            border-radius: 60px;
            padding: 1.05rem 5.5rem 1.05rem 1.75rem;
            color: var(--cream);
            font-family: 'Jost', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            outline: none;
            transition: all 0.3s;
        }

        .input-field::placeholder { color: rgba(253,250,246,0.45); }
        .input-field:focus {
            background: rgba(253,250,246,0.2);
            border-color: rgba(253,250,246,0.6);
        }

        .send-btn {
            position: absolute;
            right: 7px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(253,250,246,0.88);
            color: var(--dark);
            border: none;
            border-radius: 50px;
            padding: 0.6rem 1.3rem;
            font-family: 'Jost', sans-serif;
            font-size: 0.78rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover { background: var(--cream); }
        .send-btn:disabled { opacity: 0.5; cursor: default; }

        /* Typing indicator */
        .typing {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 0.75rem 1.2rem;
            align-self: flex-start;
        }

        .dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--sand);
            animation: bounce 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%,80%,100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1.1); opacity: 1; }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Reset button */
        .reset-btn {
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(253,250,246,0.35);
            background: none;
            border: none;
            cursor: pointer;
            margin-top: 0.75rem;
            transition: color 0.3s;
        }
        .reset-btn:hover { color: rgba(253,250,246,0.7); }
    </style>
</head>
<body>
    <div class="bg"></div>

    <nav class="nav">
        <a href="/" class="nav-logo">💧 Vitality</a>
        <a href="/" class="nav-back">← Back</a>
    </nav>

    <div class="wellness-wrap">
        <div class="wellness-inner">

            <div class="heading-wrap" id="headingWrap">
                <h1>How are you<br>feeling today?</h1>
            </div>

            <div class="messages" id="messages"></div>

            <div class="input-wrap">
                <input
                    type="text"
                    class="input-field"
                    id="userInput"
                    placeholder="Describe how you're feeling…"
                    autocomplete="off"
                />
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
            </div>

            <button class="reset-btn" id="resetBtn" style="display:none" onclick="resetChat()">
                Start new conversation
            </button>
        </div>
    </div>

    <script>
    let chatHistory = [];

    const messagesEl  = document.getElementById('messages');
    const inputEl     = document.getElementById('userInput');
    const sendBtn     = document.getElementById('sendBtn');
    const headingWrap = document.getElementById('headingWrap');
    const resetBtn    = document.getElementById('resetBtn');

    inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    function appendMsg(role, content) {
        const wrap = document.createElement('div');
        wrap.className = 'msg';

        if (role === 'user') {
            wrap.classList.add('msg-user');
            wrap.textContent = content;
            wrap.style.alignSelf = 'flex-end';
        } else {
            wrap.style.alignSelf = 'flex-start';
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = '🌿 Wellness Coach';
            wrap.appendChild(label);
            const body = document.createElement('div');
            body.className = 'msg-bot';
            // render basic markdown bold/italic
            body.innerHTML = content
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/\n/g, '<br>');
            wrap.appendChild(body);
        }

        messagesEl.appendChild(wrap);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
        const t = document.createElement('div');
        t.className = 'typing';
        t.id = 'typing';
        t.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        messagesEl.appendChild(t);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
        const t = document.getElementById('typing');
        if (t) t.remove();
    }

    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text) return;

        // Hide heading after first message
        headingWrap.classList.add('hidden');
        resetBtn.style.display = 'block';

        inputEl.value = '';
        sendBtn.disabled = true;

        chatHistory.push({ role: 'user', content: text });
        appendMsg('user', text);
        showTyping();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: chatHistory })
            });
            const data = await res.json();
            removeTyping();
            chatHistory.push({ role: 'assistant', content: data.reply });
            appendMsg('assistant', data.reply);
        } catch (e) {
            removeTyping();
            appendMsg('assistant', 'Something went wrong. Please try again.');
        }

        sendBtn.disabled = false;
        inputEl.focus();
    }

    function resetChat() {
        chatHistory = [];
        messagesEl.innerHTML = '';
        headingWrap.classList.remove('hidden');
        resetBtn.style.display = 'none';
        inputEl.focus();
    }
    </script>
</body>
</html>

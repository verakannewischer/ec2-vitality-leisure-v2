<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vitality Leisure Park{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-logo">💧 Vitality</a>
        <div class="nav-links">
            <a href="/manager" class="nav-link {% if request.path == '/manager' %}active{% endif %}">Manager</a>
            <a href="/visitor" class="nav-link {% if request.path == '/visitor' %}active{% endif %}">Plan Visit</a>
            <a href="/wellness" class="nav-link {% if request.path == '/wellness' %}active{% endif %}">Wellness</a>
        </div>
    </nav>

    {% block content %}{% endblock %}

    <script src="/static/js/main.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
